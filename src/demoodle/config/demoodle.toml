[architecture]
active = "bigram"

# No architecture-specific hyperparameters — vocab_size comes from the tokenizer artifact
[architecture.bigram]

[architecture.mlp]
embedding_dim = 32
context_length = 8
hidden_size = 128

# Stub — populated when W14 (transformer architecture) is built
[architecture.transformer]
embedding_dim = 64
context_length = 32
n_layers = 2
n_heads = 2
dropout = 0.0

[tokenizer]
active = "char"

# No tokenizer-specific settings — vocabulary is derived from the corpus
[tokenizer.char]

# Stub — populated when W17 (BPE tokenizer) is built
[tokenizer.bpe]
vocab_size = 256

[training.pretrain]
learning_rate = 1e-3
batch_size = 32
n_steps = 5_000

[corpus]
active = "names"

[corpus.names]
url = "https://raw.githubusercontent.com/karpathy/makemore/master/names.txt"
description = "32,000 US baby names from the Social Security Administration (1880–2018)"
license = "Public domain (US government data)"

[corpus.shakespeare]
url = "https://raw.githubusercontent.com/karpathy/char-rnn/master/data/tinyshakespeare/input.txt"
description = "~1 MB excerpt of Shakespeare's works (Tiny Shakespeare)"
license = "Public domain"

[corpus.code]
url = ""
description = "Synthetic Python code corpus (W15)"
license = ""

[paths]
cache_dir = "{cache_path}"
