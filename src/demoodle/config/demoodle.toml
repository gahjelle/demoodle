[architecture]
active = "bigram"

# No architecture-specific hyperparameters — vocab_size comes from the tokenizer artifact
[architecture.bigram]

[architecture.mlp]
embedding_dim = 32
context_length = 8
hidden_size = 128

# Stub — populated when W14 (transformer architecture) is built
[architecture.transformer]
embedding_dim = 64
context_length = 32
n_layers = 2
n_heads = 2
dropout = 0.0

[tokenizer]
active = "char"

# No tokenizer-specific settings — vocabulary is derived from the corpus
[tokenizer.char]

# Stub — populated when W17 (BPE tokenizer) is built
[tokenizer.bpe]
vocab_size = 256

[training]
learning_rate = 1e-3
batch_size = 32
n_steps = 5_000

[paths]
cache_dir = "{cache_path}"
data_dir = "{project_path}/data"
